<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | The Phantom Links</title>

    <script src="https://kit.fontawesome.com/12dd025e5e.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;550;700;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- MENU -->
<div class="menu-bar">
    <div class="logo-container">
        <a href="../index.html">
            <img src="assets/logo.png" class="logo default" alt="Logo">
        </a>
    </div>
</div>

<main>
    <div class="login-section-container">

        <!-- LEFT -->
        <div class="image-section">
            <img src="assets/form-img.webp" alt="">
        </div>

        <!-- RIGHT -->
        <div class="form-section">

            <h2>Create Account</h2>

            <input id="firstName" placeholder="First Name">
            <input id="lastName" placeholder="Last Name">

            <input id="email" type="email" placeholder="Email">
            <input id="phone" type="tel" placeholder="Phone Number">

            <div class="password-field">
                <input id="password" type="password" placeholder="Password">

                <span class="toggle-password" onclick="togglePassword()">
                    <i id="pwIcon" class="fa-solid fa-eye"></i>
                </span>
            </div>

            <!-- strength bars -->
            <div class="strength-bars">
                <div class="bar" id="bar1"></div>
                <div class="bar" id="bar2"></div>
                <div class="bar" id="bar3"></div>
            </div>

            <div id="strengthText">Password strength</div>

            <!-- rules -->
            <ul class="pw-rules">
                <li id="rule-length">At least 8 characters</li>
                <li id="rule-upper">One uppercase letter</li>
                <li id="rule-number">One number</li>
                <li id="rule-special">One special character</li>
            </ul>

            <div class="password-field">
                <input id="confirmPassword" type="password" placeholder="Re-enter Password">

                <span class="toggle-password" onclick="toggleConfirmPassword()">
                    <i id="cpwIcon" class="fa-solid fa-eye"></i>
                </span>
            </div>

            <button id="signupBtn">Sign Up</button>

            <p>Already have an account? <a href="../login/index.html">Login</a></p>

        </div>

    </div>
</main>

<footer class="site-footer">
    <div class="footer-bottom">
        <p>&copy; 2026 The Phantom Links. All Rights Reserved.</p>
    </div>
</footer>

<!-- Firebase + JS -->
<script type="module" src="../firebase-config.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
