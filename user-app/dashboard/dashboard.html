<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | The Phantom Links</title>

    <link rel="stylesheet" href="css/dashboard.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>The Phantom Links</h2>

        <nav>
            <a href="#">Dashboard</a>
            <a href="#">My Trips</a>
            <a href="#">Bookings</a>
            <a href="#">Settings</a>
        </nav>

        <button id="logoutBtn">Logout</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>Welcome, <span id="name">Loading...</span></h1>

        <div class="cards">

            <div class="card">
                <h3>Profile</h3>
                <p>Email: <span id="email">Loading...</span></p>
                <p>Phone: <span id="phone">Loading...</span></p>
            </div>

            <div class="card">
                <h3>My Trips</h3>
                <div id="tripsContainer" class="trips-grid"></div>
            </div>
        </div>

    </div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
