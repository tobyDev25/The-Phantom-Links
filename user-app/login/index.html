<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Members Login | The Phantom Links</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="https://kit.fontawesome.com/12dd025e5e.js" crossorigin="anonymous"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;550;700;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    </head>
    <body>

        <div class="menu-bar">
            <div class="logo-container">
                    <a href="../index.html">
                        <img src="assets/logo.png" class="logo default" alt="Logo">
                    </a>
            </div>
        </div>


        <main>
             <div class="login-section-container">

                <!-- LEFT SIDE -->
                <div class="image-section">
                    <img src="assets/bg-image.jpg" alt="">
                </div>

                <!-- RIGHT SIDE -->
                <div class="form-section">
                    <h2>Member Login</h2>

                    <input id="email" type="email" placeholder="Email">
                    <input id="password" type="password" placeholder="Password">

                    <button onclick="login()">Login</button>

                    <p>Don’t have an account? <a href="../sign-up/index.html">Sign up</a></p>
                </div>
            </div>
        </main>
       

        <!-- Footer -->
            <footer class="site-footer">
                <div class="footer-bottom">
                    <p>&copy; 2026 The Phantom Links. All Rights Reserved.</p>
                </div>
            </footer>

        <script type="module">
            import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
            import { auth } from "../firebase-config.js";

            window.login = async function () {
            try {
                await signInWithEmailAndPassword(
                auth,
                email.value,  
                password.value
                );

                alert("Logged in!");
                window.location.href = "../dashboard/dashboard.html";
            } catch (err) {
                alert(err.message);
            }
            };
        </script>
    </body>
    
</html>
