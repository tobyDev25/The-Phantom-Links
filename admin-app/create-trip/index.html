<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Trip - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">       
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Create Trip</h1>

        <p class="subtitle">
            Creating trip for: <span id="selectedUserText">Loading...</span>
        </p>

        <input id="tripName" placeholder="Trip Name">

        <input id="tripLocation" placeholder="Location">

        <input id="tripDate" type="date">

        <input id="tripPeople" type="number" placeholder="Number of People">

        <select id="tripStatus">
            <option value="planned">Planned</option>
            <option value="in-progress">In Progress</option>
            <option value="ready">Ready</option>
        </select>

        <button id="createTripBtn">Create Trip</button>

        <p id="message"></p>

    </div>

</div>

<script type="module" src="js/admin-create-trip.js"></script>

</body>
</html>
