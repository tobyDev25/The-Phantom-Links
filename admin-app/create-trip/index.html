<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Create Trip</title>
</head>

<body>

<h2>Create Trip (Admin)</h2>

<input id="userId" placeholder="User UID">
<input id="tripName" placeholder="Trip Name">
<input id="tripLocation" placeholder="Location">
<input id="tripDate" type="date">
<input id="tripPeople" type="number">

<select id="tripStatus">
    <option value="planned">Planned</option>
    <option value="in-progress">In Progress</option>
    <option value="ready">Ready</option>
</select>

<button id="createTripBtn">Create Trip</button>

<script type="module" src="js/admin-create-trip.js"></script>

</body>
</html>
