<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="layout">

    <!-- =========================
         SIDEBAR
    ========================== -->
    <div class="sidebar">

        <h2>Admin Panel</h2>

        <nav>
            <a href="/admin-app/dashboard/index.html">Users</a>
            <a href="#">Trips</a>
        </nav>

        <button id="logoutBtn">Logout</button>

    </div>

    <!-- =========================
         MAIN CONTENT
    ========================== -->
    <div class="main">

        <h1>Users</h1>

        <p>Manage all customers and create trips for them.</p>

        <!-- =========================
             USERS TABLE
        ========================== -->
        <div class="users-container">

            <table class="user-table">

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="usersContainer">
                    <!-- JS injects rows here -->
                </tbody>

            </table>

        </div>

    </div>

</div>


<!-- CREATE TRIP MODAL -->
<div id="tripModal" class="modal">

    <div class="modal-content">

        <span class="close-btn" id="closeModal">&times;</span>

        <h2>Create Trip</h2>
        <p id="modalUserName">User: </p>

        <input id="tripName" placeholder="Trip Name">
        <input id="tripLocation" placeholder="Location">
        <input id="tripDate" type="date">
        <input id="tripPeople" type="number" placeholder="People">

        <select id="tripStatus">
            <option value="planned">Planned</option>
            <option value="in-progress">In Progress</option>
            <option value="ready">Ready</option>
        </select>

        <button id="saveTripBtn">Create Trip</button>

        <p id="modalMessage"></p>

    </div>

</div>

<!-- =========================
     JS
========================= -->
<script type="module" src="js/admin-dashboard.js"></script>

</body>
</html>
